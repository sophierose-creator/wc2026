  const bh=((parseInt(m[1])-parseInt(m[3])+1)%24+24)%24;

// Calculate performance score per team based on tournament results
// Score = wins * 3 + draws * 1 + goal_diff * 0.1, weighted by round
// Knockout wins count double
function calcTeamScores() {
  const scores = {};
  const gamesPlayed = {};

  for (const r of results) {
    gamesPlayed[r.home] = (gamesPlayed[r.home]||0)+1;
    gamesPlayed[r.away] = (gamesPlayed[r.away]||0)+1;
  }

  // Initialise all player teams
  for (const teams of Object.values(PLAYERS))
    for (const t of teams) scores[n(t)] = 0;

  for (const r of results) {
    const isKnockout = parseDate(r.date) >= KNOCKOUT_START;
    const mult = isKnockout ? 2 : 1;
    const gd = r.homeGoals - r.awayGoals;

    // Determine winner (account for penalties)
    let homeWin, awayWin, draw;
    if (r.pens) {
      homeWin = r.pens.home > r.pens.away;
      awayWin = r.pens.away > r.pens.home;
      draw = false;
    } else if (r.et) {
      homeWin = r.et.home > r.et.away;
      awayWin = r.et.away > r.et.home;
      draw = false;
    } else {
      homeWin = r.homeGoals > r.awayGoals;
      awayWin = r.awayGoals > r.homeGoals;
      draw = r.homeGoals === r.awayGoals;
    }

    if (scores[r.home] !== undefined) {
      if (homeWin) scores[r.home] += 3 * mult;
      else if (draw) scores[r.home] += 1;
      scores[r.home] += gd * 0.1;
    }
    if (scores[r.away] !== undefined) {
      if (awayWin) scores[r.away] += 3 * mult;
      else if (draw) scores[r.away] += 1;
      scores[r.away] -= gd * 0.1;
    }
  }

  // Zero out eliminated teams
  for (const t of eliminated) if (scores[t] !== undefined) scores[t] = 0;

  return scores;
}

function calcEliminated() {
  const gamesPlayed = {};
  const knockoutResults = [];
  for (const r of results) {
    const d = parseDate(r.date);
    if (d >= KNOCKOUT_START) knockoutResults.push(r);
    else {
      gamesPlayed[r.home] = (gamesPlayed[r.home]||0)+1;
      gamesPlayed[r.away] = (gamesPlayed[r.away]||0)+1;
    }
  }
  const knockoutWinners = new Set(), knockoutLosers = new Set();
  for (const r of knockoutResults) {
    let winner = null;
    if (r.pens) winner = r.pens.home > r.pens.away ? r.home : r.away;
    else if (r.et) winner = r.et.home > r.et.away ? r.home : r.away;
    else if (r.homeGoals > r.awayGoals) winner = r.home;
    else if (r.awayGoals > r.homeGoals) winner = r.away;
    if (winner) { knockoutWinners.add(winner); knockoutLosers.add(winner===r.home?r.away:r.home); }
  }
  const stillIn = new Set();
  for (const m of upcoming) { stillIn.add(m.home); stillIn.add(m.away); }
  const hasPlayed = new Set([...Object.keys(gamesPlayed),...knockoutResults.flatMap(r=>[r.home,r.away])]);
  const elim = new Set();
  for (const t of hasPlayed) {
    if (knockoutLosers.has(t)) elim.add(t);
    else if (!knockoutWinners.has(t) && !stillIn.has(t) && (gamesPlayed[t]||0) >= 3) elim.add(t);
  }
  return elim;
}

function buildTeamPlayers() {
  const tp = {};
  for (const [player,teams] of Object.entries(PLAYERS))
    for (const team of teams) {
      const t = n(team);
      (tp[t]=tp[t]||[]).push(player);
    }
  return tp;
}

function computePlayerScores(teamScores) {
  return Object.entries(PLAYERS).map(([name, teams]) => {
    const teamData = teams.map(t => ({
      team: n(t),
      score: teamScores[n(t)] || 0,
      out: eliminated.has(n(t))
    }));
    const total = teamData.reduce((s,t) => s + (t.out ? 0 : t.score), 0);
    return { name, total, teamData };
  }).sort((a,b) => b.total - a.total || a.name.localeCompare(b.name));
}

function renderLeaderboard() {
  eliminated = calcEliminated();
  const teamScores = calcTeamScores();
  const scores = computePlayerScores(teamScores);
  const top = scores[0]?.total || 1;

  // Find max team score for normalising bar display
  const maxTeamScore = Math.max(...Object.values(teamScores).filter(s=>s>0), 1);

  document.getElementById("leaderboard-panel").innerHTML =
    '<div class="prob-note">Score = combined performance rating of your active teams.<br>Higher = better chance of going deep in the tournament.</div>' +
    (eliminated.size ? '<div class="elim-key">⚫ Crossed out = eliminated</div>' : '') +
    scores.map((p, i) => {
      const pct = top > 0 ? (p.total / top * 100) : 0;
      const isTied = i > 0 && scores[i-1].total === p.total;
      const rank = isTied ? scores.findIndex(s => s.total === p.total) + 1 : i + 1;
      const isTop = i === 0, isOpen = expanded === p.name;
      const activeTeams = p.teamData.filter(t => !t.out).map(t => t.team);
      const c = PLAYER_COLORS[p.name] || "#aaa";
      return `<div class="player-card ${isTop?'leader':''} ${isOpen?'open':''}" onclick="toggle('${p.name}')">
        <div class="player-row">
          <div class="rank ${rank<=3?'medal':''}">${rank<=3?MEDALS[rank-1]:rank}</div>
          <div class="player-info">
            <div class="player-name" style="color:${c}">${p.name}</div>
            <div class="player-teams">${activeTeams.join(' · ') || 'All teams eliminated'}</div>
            <div class="bar-track"><div class="bar-fill ${isTop?'leader':''}" style="width:${pct}%;background:linear-gradient(90deg,${c}99,${c})"></div></div>
          </div>
          <div class="player-score">
            <div class="score-num ${isTop?'leader':''}">${p.total.toFixed(1)}</div>
            <div class="score-label">rating</div>
          </div>
          <div class="chevron">${isOpen?'▲':'▼'}</div>
        </div>
        <div class="breakdown ${isOpen?'open':''}">
          ${p.teamData.map(({team,score,out}) => `
            <div class="team-row ${out?'elim':''}">
              <div>
                <span class="team-name ${out?'elim':''}">${team}</span>
                ${out?'<span class="elim-tag">⚫ ELIMINATED</span>':''}
              </div>
              <div class="team-prob">
                <span class="prob-score ${!out?'active':''}">${out?'—':score.toFixed(1)}</span>
                <span class="prob-label">${out?'out':'perf. score'}</span>
              </div>
            </div>`).join("")}
        </div>
      </div>`;
    }).join("");
}

function renderResults() {
  const byDate = {};
  for (const r of [...results].reverse()) (byDate[r.date]=byDate[r.date]||[]).push(r);
  const tp = buildTeamPlayers();
  document.getElementById("results-panel").innerHTML =
    Object.entries(byDate).map(([date,games]) => `
      <div class="date-group">
        <div class="date-label">${date}</div>
        ${games.map(r => {
          const hP = tp[r.home]||[], aP = tp[r.away]||[];
          return `<div class="match-row ${hP.length||aP.length?'interest':''}">
            <div style="flex:1;text-align:right">
              <span class="match-team home ${eliminated.has(r.home)?'out':''}">${r.home}</span>
              ${hP.length?`<div class="player-tags" style="text-align:right">${hP.map(p=>`<span class="player-tag" style="background:${PLAYER_COLORS[p]}22;color:${PLAYER_COLORS[p]};border:1px solid ${PLAYER_COLORS[p]}55">${p}</span>`).join("")}</div>`:''}
            </div>
            <div style="text-align:center;flex-shrink:0">
              <div class="score-box">${r.et?r.et.home:r.homeGoals} – ${r.et?r.et.away:r.awayGoals}${r.pens?`<div style="font-size:9px;color:#6888aa;letter-spacing:0;font-weight:600">(${r.pens.home}-${r.pens.away} pens)</div>`:(r.et?'<div style="font-size:9px;color:#6888aa;letter-spacing:0;font-weight:600">AET</div>':'')}</div>
            </div>
            <div style="flex:1">
              <span class="match-team ${eliminated.has(r.away)?'out':''}">${r.away}</span>
              ${aP.length?`<div class="player-tags">${aP.map(p=>`<span class="player-tag" style="background:${PLAYER_COLORS[p]}22;color:${PLAYER_COLORS[p]};border:1px solid ${PLAYER_COLORS[p]}55">${p}</span>`).join("")}</div>`:''}
            </div>
          </div>`;
        }).join("")}
      </div>`).join("") +
    `<p class="footer-note">${results.length} matches · data via openfootball</p>`;
  document.getElementById("match-count").textContent = results.length;
}

function renderUpcoming() {
  const tp = buildTeamPlayers();
  const byDate = {};
  for (const m of upcoming) (byDate[m.date]=byDate[m.date]||[]).push(m);
  if (!upcoming.length) {
    document.getElementById("upcoming-panel").innerHTML = '<p class="footer-note" style="margin-top:40px">No upcoming matches</p>';
    document.getElementById("upcoming-count").textContent = "0";
    return;
  }
  document.getElementById("upcoming-panel").innerHTML =
    Object.entries(byDate).map(([date,games]) => `
      <div class="date-group">
        <div class="date-label">${date}</div>
        ${games.map(m => {
          const hP = tp[m.home]||[], aP = tp[m.away]||[];
          const interest = hP.length||aP.length;
          return `<div class="match-row ${interest?'interest':''}">
            <div style="flex:1;text-align:right">
              <div class="match-team home ${eliminated.has(m.home)?'out':''}">${m.home}</div>
              ${hP.length?`<div class="player-tags" style="text-align:right">${hP.map(p=>`<span class="player-tag" style="background:${PLAYER_COLORS[p]}22;color:${PLAYER_COLORS[p]};border:1px solid ${PLAYER_COLORS[p]}55">${p}</span>`).join("")}</div>`:''}
            </div>
            <div style="text-align:center;flex-shrink:0;min-width:60px">
              <div class="vs-box">vs</div>
              ${m.time?`<div class="match-meta">${m.time}</div>`:''}
              ${m.round?`<div class="match-meta">${m.round}</div>`:''}
            </div>
            <div style="flex:1">
              <div class="match-team ${eliminated.has(m.away)?'out':''}">${m.away}</div>
              ${aP.length?`<div class="player-tags">${aP.map(p=>`<span class="player-tag" style="background:${PLAYER_COLORS[p]}22;color:${PLAYER_COLORS[p]};border:1px solid ${PLAYER_COLORS[p]}55">${p}</span>`).join("")}</div>`:''}
            </div>
          </div>`;
        }).join("")}
      </div>`).join("") +
    `<p class="footer-note">${upcoming.length} upcoming · coloured tags = whose team is playing</p>`;
  document.getElementById("upcoming-count").textContent = upcoming.length;
}

function render() {
  eliminated = calcEliminated();
  renderLeaderboard();
  renderResults();
  renderUpcoming();
}

function toggle(name) { expanded = expanded===name?null:name; renderLeaderboard(); }

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["leaderboard","results","upcoming"][i]===tab));
  ["leaderboard","results","upcoming"].forEach(id=>document.getElementById(id+"-panel").classList.toggle("active",tab===id));
}

function setStatus(msg,type="") { const el=document.getElementById("status"); el.textContent=msg; el.className=type; }

async function fetchAll(manual=false) {
  const btn=document.getElementById("refresh-btn");
  btn.disabled=true; btn.textContent="Updating…";
  if(manual) setStatus("Fetching latest data…");
  try {
    const res = await fetch(API_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const finished = data.matches.filter(m=>m.score&&m.score.ft);
    const unplayed = data.matches.filter(m=>!m.score);
    const newResults = finished.map(m=>{
      const s=m.score;
      const r={date:fmtDate(m.date),home:n(m.team1),homeGoals:s.ft[0],awayGoals:s.ft[1],away:n(m.team2)};
      if(s.p) r.pens={home:s.p[0],away:s.p[1]};
      if(s.et&&(s.et[0]!==s.ft[0]||s.et[1]!==s.ft[1])) r.et={home:s.et[0],away:s.et[1]};
      return r;
    }).sort((a,b)=>parseDate(a.date)-parseDate(b.date)||a.home.localeCompare(b.home));
    const newUpcoming = unplayed.map(m=>({
      date:fmtDate(m.date),home:n(m.team1),away:n(m.team2),
      time:bstTime(m.time||""),round:m.group||m.round||""
    }));
    const added = newResults.length - results.length;
    results = newResults; upcoming = newUpcoming;
    render();
    const time = new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    setStatus(manual?(added>0?`Updated ${time} · +${added} new result${added>1?'s':''}`:`Updated ${time} · no new results`):`Last updated ${time} · ${results.length} matches`, added>0?"success":"");
  } catch(e) {
    setStatus(`Couldn't fetch — showing cached data: ${e.message}`,"error");
    render();
  }
  btn.disabled=false; btn.textContent="🔄 Refresh";
}

render();
fetchAll(false);
</script>
